name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build-test-package:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Resolve pinned official HDT package
        shell: powershell
        run: |
          $hdt = .\scripts\resolve-hdt.ps1 -Version 1.53.8
          "HDT_INSTALL_DIR=$hdt" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Read plugin version
        id: plugin_version
        shell: powershell
        run: |
          $version = .\scripts\get-version.ps1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Build, test, package, and verify
        shell: powershell
        run: .\scripts\verify.ps1 -HdtInstallDir $env:HDT_INSTALL_DIR
      - uses: actions/upload-artifact@v4
        with:
          name: DustFinder-${{ steps.plugin_version.outputs.version }}
          path: dist/DustFinder-${{ steps.plugin_version.outputs.version }}.zip
          if-no-files-found: error
      - name: Publish versioned GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $version = '${{ steps.plugin_version.outputs.version }}'
          $tag = "v$version"
          $pushedTag = '${{ github.ref_name }}'
          $asset = "dist/DustFinder-$version.zip"
          if ($pushedTag -ne $tag) {
            throw "Pushed tag $pushedTag does not match project version $tag."
          }
          gh release view $tag --repo '${{ github.repository }}' *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release upload $tag $asset --repo '${{ github.repository }}' --clobber
          }
          else {
            gh release create $tag $asset --repo '${{ github.repository }}' --target '${{ github.sha }}' --title "DustFinder $tag" --generate-notes --latest
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish or update GitHub Release $tag."
          }
