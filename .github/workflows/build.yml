name: build

on:
  push:
  pull_request:

jobs:
  build-test-package:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Resolve pinned official HDT package
        shell: powershell
        run: |
          $hdt = .\scripts\resolve-hdt.ps1 -Version 1.53.8
          "HDT_INSTALL_DIR=$hdt" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build and test
        shell: powershell
        run: .\scripts\build.ps1 -Configuration Release -HdtInstallDir $env:HDT_INSTALL_DIR
      - name: Package
        shell: powershell
        run: .\scripts\package.ps1 -Version 0.1.0 -HdtInstallDir $env:HDT_INSTALL_DIR -NoBuild
      - name: Verify plugin contract
        shell: powershell
        run: powershell.exe -NoProfile -Sta -ExecutionPolicy Bypass -File .\scripts\verify-plugin.ps1 -HdtInstallDir $env:HDT_INSTALL_DIR
      - uses: actions/upload-artifact@v4
        with:
          name: DustFinder-0.1.0
          path: dist/DustFinder-0.1.0.zip
          if-no-files-found: error
